<div class="nx nx-sim" data-nx-sim>
  <div class="nx__bar">
    <span class="nx__dot nx__dot--b"></span>
    <span class="nx__dot nx__dot--a"></span>
    <span class="nx__dot nx__dot--c"></span>
    <span class="nx__kicker">one cell, end to end</span>
    <span class="nx__spacer"></span>
    <button class="nx__run" data-nx-replay type="button">&#8635; Replay</button>
  </div>

  <div class="nx-sim__rail" data-nx-rail></div>
  <div class="nx-sim__stage" data-nx-stage></div>

  <div class="nx-sim__ctrl">
    <span class="nx-sim__hint">click a stage above, or a dot</span>
    <span class="nx-sim__dots" data-nx-dots></span>
    <span class="nx-sim__count" data-nx-count></span>
  </div>
</div>
