<style>
@import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&family=JetBrains+Mono:wght@400;500;600&display=swap');

.nx {
  /* light: warm paper drafting sheet */
  --nx-paper: #f2ead6;
  --nx-card: rgba(255,253,247,.66);
  --nx-lift: #fffdf6;
  --nx-term-bg: #fbf6e9;
  --nx-code: rgba(47,62,77,.07);
  --nx-ink: #2f3e4d;
  --nx-ink-soft: #5c6b78;
  --nx-faint: #94917f;
  --nx-grid: rgba(57,86,116,.11);
  --nx-line: rgba(47,62,77,.28);
  --nx-line-strong: rgba(47,62,77,.5);

  --nx-helix: #4f9e8c;   /* sage    */
  --nx-steel: #4d7aa6;   /* blueprint blue */
  --nx-rust:  #c1764f;   /* clay    */
  --nx-julia: #b0883a;   /* ochre   */
  --nx-red:   #b5524a;   /* brick   */

  --nx-hand: 'Architects Daughter', 'Comic Sans MS', cursive;
  --nx-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --nx-sketch: 14px 10px 16px 9px / 9px 15px 8px 14px;

  font-family: var(--nx-mono);
  color: var(--nx-ink);
  margin: 1.7rem 0 2rem;
  border: 1.5px solid var(--nx-line-strong);
  border-radius: var(--nx-sketch);
  background-color: var(--nx-paper);
  background-image:
    linear-gradient(var(--nx-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--nx-grid) 1px, transparent 1px);
  background-size: 22px 22px;
  box-shadow: 0 14px 30px -18px rgba(0,0,0,.5);
}

@media (prefers-color-scheme: dark) {
  .nx {
    /* dark: cyanotype blueprint */
    --nx-paper: #0f2435;
    --nx-card: rgba(170,205,235,.05);
    --nx-lift: #163049;
    --nx-term-bg: #0b1d2c;
    --nx-code: rgba(190,215,235,.10);
    --nx-ink: #dbe7f1;
    --nx-ink-soft: #9fb6c9;
    --nx-faint: #6f879b;
    --nx-grid: rgba(150,190,225,.13);
    --nx-line: rgba(190,215,235,.26);
    --nx-line-strong: rgba(190,215,235,.46);

    --nx-helix: #6fc7b4;
    --nx-steel: #7fabe2;
    --nx-rust:  #e09368;
    --nx-julia: #d6b25f;
    --nx-red:   #e8867d;
  }
}

.nx * { box-sizing: border-box; }

.nx__bar {
  display: flex; align-items: center; gap: .55rem;
  padding: .7rem 1rem;
  border-bottom: 1.5px dashed var(--nx-line);
}
.nx__dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--nx-ink); background: transparent; }
.nx__dot--a { background: var(--nx-rust); border-color: var(--nx-rust); }
.nx__dot--b { background: var(--nx-helix); border-color: var(--nx-helix); }
.nx__dot--c { background: var(--nx-julia); border-color: var(--nx-julia); }
.nx__kicker {
  font-family: var(--nx-hand);
  font-size: .92rem; letter-spacing: .04em;
  color: var(--nx-ink-soft); margin-left: .3rem;
}
.nx__spacer { flex: 1; }

.nx__run {
  font-family: var(--nx-hand); font-size: .95rem;
  color: var(--nx-ink); background: var(--nx-card);
  border: 1.5px solid var(--nx-line-strong); border-radius: 10px 8px 11px 7px / 7px 11px 8px 10px;
  padding: .3rem .8rem; cursor: pointer;
  transition: transform .12s, background .15s;
}
.nx__run:hover { background: var(--nx-lift); transform: rotate(-.6deg); }
.nx__run[disabled] { opacity: .45; cursor: default; transform: none; }

/* ---- system schematic ---- */
.nx-arch__stage { position: relative; padding: 1.1rem 1rem .9rem; }
.nx-arch__nodes { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
.nx-arch__node { position: relative; }

summary.nx-arch__btn { list-style: none; }
summary.nx-arch__btn::-webkit-details-marker { display: none; }
.nx-arch__btn {
  display: flex; align-items: center; gap: .7rem;
  width: 100%; text-align: left; cursor: pointer;
  background: var(--nx-card);
  border: 1.5px solid var(--nx-line);
  border-left: 4px solid var(--nx-c, var(--nx-line-strong));
  border-radius: var(--nx-sketch);
  padding: .7rem .85rem;
  color: inherit; font: inherit;
  transition: border-color .15s, background .15s, transform .12s;
}
.nx-arch__btn:hover { border-color: var(--nx-line-strong); transform: translateX(2px); }
.nx-arch__node.is-active > .nx-arch__btn,
.nx-arch__node[open] > .nx-arch__btn {
  border-color: var(--nx-c);
  background: color-mix(in srgb, var(--nx-c) 12%, var(--nx-lift));
}
.nx-arch__badge {
  flex: none;
  font-family: var(--nx-hand); font-size: 1rem;
  width: 32px; height: 32px; display: grid; place-items: center;
  color: var(--nx-c);
  border: 1.5px solid var(--nx-c);
  border-radius: 10px 8px 12px 7px / 7px 12px 8px 10px;
  background: color-mix(in srgb, var(--nx-c) 12%, transparent);
}
.nx-arch__txt { flex: 1; min-width: 0; }
.nx-arch__name { font-family: var(--nx-hand); font-size: 1.12rem; color: var(--nx-ink); }
.nx-arch__tech { color: var(--nx-c); }
.nx-arch__role { display: block; color: var(--nx-ink-soft); font-size: .8rem; margin-top: .15rem; line-height: 1.5; }
.nx-arch__chev { flex: none; font-family: var(--nx-mono); color: var(--nx-faint); transition: transform .2s, color .15s; }
.nx-arch__node[open] .nx-arch__chev { transform: rotate(90deg); color: var(--nx-c); }

.nx-arch__detail {
  width: 100%;
  margin: 0; padding: .7rem .9rem .85rem calc(32px + .7rem + .85rem);
  color: var(--nx-ink-soft); font-size: .85rem; line-height: 1.65;
}
.nx-arch__detail code { color: var(--nx-ink); background: var(--nx-code); padding: 0 .25em; border-radius: 3px; }
.nx-arch__tags { margin-top: .6rem; display: flex; flex-wrap: wrap; gap: .4rem; }
.nx-arch__tag {
  font-family: var(--nx-mono); font-size: .68rem; color: var(--nx-ink);
  border: 1.5px solid var(--nx-line); border-radius: 999px; padding: .1rem .55rem; background: var(--nx-card);
}

/* connector — hand-drawn dashed ink, with a direction marker */
.nx-arch__link { height: 26px; margin-left: calc(.85rem + 16px); border-left: 1.5px dashed var(--nx-line-strong); width: 0; position: relative; }
.nx-arch__link.is-down::after, .nx-arch__link.is-up::after {
  content: ""; position: absolute; left: -4px; width: 0; height: 0;
  border-left: 4px solid transparent; border-right: 4px solid transparent;
}
.nx-arch__link.is-down::after { top: 100%; margin-top: -5px; border-top: 6px solid var(--nx-rust); }
.nx-arch__link.is-up::after   { bottom: 100%; margin-bottom: -5px; border-bottom: 6px solid var(--nx-helix); }

/* artifact panel — shows what actually moves at each step */
.nx-arch__art {
  margin-top: 1rem;
  border: 1.5px solid var(--nx-line);
  border-left: 4px solid var(--ac, var(--nx-line-strong));
  border-radius: var(--nx-sketch);
  background: var(--nx-card);
  padding: .75rem .85rem .8rem;
  transition: opacity .22s ease;
}
.nx-arch__art[hidden] { display: none; }
.nx-arch__art-head { display: flex; align-items: baseline; gap: .6rem; margin-bottom: .5rem; }
.nx-arch__art-step { font-family: var(--nx-hand); font-size: 1.05rem; color: var(--ac, var(--nx-ink)); }
.nx-arch__art-count { font-family: var(--nx-mono); font-size: .66rem; color: var(--nx-faint); margin-left: auto; }
.nx-arch__art-code {
  font-family: var(--nx-mono); font-size: .76rem; line-height: 1.55;
  color: var(--nx-ink); background: var(--nx-term-bg);
  border: 1px solid var(--nx-line); border-radius: 8px 6px 9px 6px;
  padding: .6rem .7rem; margin: 0; white-space: pre-wrap; overflow-x: auto;
}
.nx-arch__art-code .c { color: var(--nx-faint); }

.nx__status {
  display: flex; align-items: center; gap: .55rem;
  padding: .65rem 1rem; border-top: 1.5px dashed var(--nx-line);
  font-family: var(--nx-hand); font-size: .98rem; color: var(--nx-ink-soft); line-height: 1.35;
}
.nx__status .nx__tick { color: var(--nx-faint); flex: none; }

/* ---- error enrichment ---- */
.nx-err__toggle { display: inline-flex; padding: 3px; gap: 3px; margin: 1rem 1rem 0; border: 1.5px solid var(--nx-line); border-radius: 9px 7px 10px 6px; background: var(--nx-card); }
.nx-err__toggle button {
  font-family: var(--nx-hand); font-size: .95rem; cursor: pointer;
  color: var(--nx-ink-soft); background: transparent; border: 0; border-radius: 6px; padding: .3rem .8rem;
  transition: background .15s, color .15s;
}
.nx-err__toggle button[aria-selected="true"] { color: var(--nx-ink); background: var(--nx-lift); }
.nx-err__panes { padding: .9rem 1rem 1.1rem; }
.nx-err__pane { display: none; }
.nx-err__pane.is-on { display: block; }

.nx-term {
  font-family: var(--nx-mono); font-size: .82rem; line-height: 1.6;
  background: var(--nx-term-bg); border: 1.5px solid var(--nx-line); border-radius: 10px 8px 11px 7px / 7px 11px 8px 10px;
  padding: .85rem .95rem; overflow-x: auto; margin: 0; color: var(--nx-ink);
}
.nx-term .nx-err-red { color: var(--nx-red); }
.nx-term .nx-dim { color: var(--nx-faint); }
.nx-ann { display: block; margin-top: .1rem; padding-left: 1.1rem; position: relative; color: var(--nx-ink); }
.nx-ann::before { content: "\21B3"; position: absolute; left: 0; color: var(--nx-faint); }
.nx-ann .nx-var { color: var(--nx-rust); font-weight: 500; }
.nx-ann .nx-type { color: var(--nx-steel); }
.nx-ann .nx-where { color: var(--nx-julia); }
.nx-err__head { font-family: var(--nx-hand); font-size: .92rem; letter-spacing: .03em; color: var(--nx-ink-soft); margin: 0 0 .45rem; }
.nx-err code { color: var(--nx-ink); background: var(--nx-code); padding: 0 .25em; border-radius: 3px; }
.nx-err p { color: var(--nx-ink-soft); }

@media (prefers-reduced-motion: reduce) {
  .nx-arch__art { transition: none; }
  .nx__run:hover { transform: none; }
}
</style>
