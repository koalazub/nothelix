name: Mirror to Codeberg

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main and tags to Codeberg
        env:
          CODEBERG_SSH_KEY: ${{ secrets.CODEBERG_SSH_KEY }}
        run: |
          if [ -z "$CODEBERG_SSH_KEY" ]; then
            echo "CODEBERG_SSH_KEY secret is not set; skipping mirror." >&2
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$CODEBERG_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 codeberg.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          remote="git@codeberg.org:koalazub/nothelix.git"
          git push --force "$remote" "HEAD:refs/heads/main"
          git push --force --tags "$remote"
