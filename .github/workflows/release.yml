name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            system: aarch64-darwin
          - target: linux-x86_64
            runner: ubuntu-24.04
            system: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build tarball
        run: nix build .#packages.${{ matrix.system }}.nothelix-tarball -L

      - name: Package as .tar.gz
        run: |
          TAG="${GITHUB_REF_NAME:-vdev}"
          DIR=$(ls -d result/nothelix-* | head -1)
          TARBALL="nothelix-${TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C result "$(basename "$DIR")"
          if command -v shasum >/dev/null; then
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          else
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          fi
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine SHA256SUMS
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.sha256' -exec cat {} \; > release/SHA256SUMS
          cp install.sh release/install.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/SHA256SUMS
            release/install.sh
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
