[[hint]]
id = "E001"
pattern = "BoundsError.*index \\[0\\]"
title = "index out of bounds (0-indexed)"
help = "Julia arrays are 1-indexed. Use v[1] for the first element."

[[hint]]
id = "E002"
pattern = "BoundsError"
title = "index out of bounds"
help = "Check array length with length(). Valid indices: 1 to length(arr)."

[[hint]]
id = "E003"
pattern = "UndefVarError: (\\w+) not defined"
title = "undefined variable: {1}"
help = "Check spelling, or define it in an earlier cell."

[[hint]]
id = "E004"
pattern = "MethodError: no method matching (\\w+)\\("
title = "no method `{1}` for these argument types"
help = "Check argument types with typeof(). See methods({1}) for available signatures."

[[hint]]
id = "E005"
pattern = "MethodError.*\\+\\(::String"
title = "cannot add string and number"
help = "Use string() to convert, or * to concatenate strings."

[[hint]]
id = "E006"
pattern = "DimensionMismatch"
title = "matrix dimension mismatch"
help = "Check sizes with size(A) and size(B). Inner dimensions must match for A*B."

[[hint]]
id = "E007"
pattern = "SingularException"
title = "matrix is singular"
help = "Matrix is not invertible. Check with det() or rank()."

[[hint]]
id = "E008"
pattern = "DomainError"
title = "math domain error"
help = "Argument outside valid domain (e.g. sqrt of negative, log of zero)."

[[hint]]
id = "E009"
pattern = "ArgumentError: Package (\\w+) not found"
title = "package {1} not installed"
help = "Run: using Pkg; Pkg.add(\"{1}\")"

[[hint]]
id = "E010"
pattern = "StackOverflowError"
title = "infinite recursion"
help = "Check base case in recursive function."

[[hint]]
id = "E011"
pattern = "TypeError: non-boolean.*if"
title = "non-boolean in if condition"
help = "Condition must evaluate to true/false, not a number or string."

[[hint]]
id = "E012"
pattern = "InexactError"
title = "cannot convert to target type without loss"
help = "Use round(), floor(), or ceil() for explicit conversion."

[[hint]]
id = "E013"
pattern = "AssertionError"
title = "assertion failed"
help = "An @assert condition evaluated to false."

[[hint]]
id = "E014"
pattern = "KeyError: key (.*) not found"
title = "key {1} not found in dictionary"
help = "Check available keys with keys(dict). Use get(dict, key, default) for safe access."

[[hint]]
id = "E015"
pattern = "ParseError"
title = "syntax error"
help = "Check for missing parentheses, brackets, or commas."
