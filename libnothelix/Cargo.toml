[package]
name = "libnothelix"
version = "0.1.0"
edition = "2021"

[lib]
name = "nothelix"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "nothelix-meta"
path = "src/bin/nothelix-meta.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
regex = "1"
base64 = "0.22"
which = "6.0"
nix = { version = "0.29", features = ["signal", "process"] }

# Image format handling
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }

# Steel FFI bindings
steel-core = { git = "https://github.com/mattwparas/steel.git", rev = "605d490c07ae6937d532d5a994920b4dab3016ad", features = ["dylibs", "sync"] }
abi_stable = "0.11"

[dev-dependencies]
tempfile = "3.10"
