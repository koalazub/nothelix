[package]
name = "libnothelix"
version = "0.1.0"
edition = "2021"

[lib]
name = "nothelix"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
base64 = "0.22"
which = "6.0"
nix = { version = "0.29", features = ["signal", "process"] }
log = "0.4"

# Image format handling
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }

# Steel FFI bindings
steel-core = { git = "https://github.com/mattwparas/steel.git", features = ["dylibs", "sync"] }
abi_stable = "0.11"

[dev-dependencies]
tempfile = "3.10"
